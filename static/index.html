<!DOCTYPE html>
<html>
<head>
    <title>Notes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            margin: 5px 5px 5px 0;
            padding: 5px 10px;
            cursor: pointer;
        }

        .note {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .content {
            white-space: pre-wrap;
            line-height: 1.4;
        }

        /* 🔥 3-line clamp */
        .note.collapsed .content {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta {
            font-size: 0.8em;
            color: gray;
            margin-top: 10px;
        }

        .actions {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>Notes</h1>

<textarea id="noteInput" rows="3" placeholder="Write a note..."></textarea>
<br>
<button onclick="addNote()">Add</button>

<div id="notesList"></div>

<script>
const API_URL = "http://127.0.0.1:8000";

function formatDate(dateStr) {
    const d = new Date(dateStr);
    return isNaN(d.getTime()) ? "—" : d.toLocaleString();
}

async function loadNotes() {
    const res = await fetch(`${API_URL}/notes`);
    const notes = await res.json();

    const container = document.getElementById("notesList");
    container.innerHTML = "";

    notes.forEach(note => {
        const div = document.createElement("div");
        div.className = "note collapsed"; // default: 3 lines

        // CONTENT
        const content = document.createElement("div");
        content.className = "content";
        content.textContent = note.content;

        // TOGGLE BUTTON
        const toggleBtn = document.createElement("button");
        toggleBtn.textContent = "Show more";

        toggleBtn.onclick = () => {
            const isCollapsed = div.classList.contains("collapsed");

            if (isCollapsed) {
                div.classList.remove("collapsed");
                toggleBtn.textContent = "Show less";
            } else {
                div.classList.add("collapsed");
                toggleBtn.textContent = "Show more";
            }
        };

        // META
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent =
            "Created: " + formatDate(note.created_at) +
            " | Updated: " + formatDate(note.updated_at);

        // ACTIONS
        const actions = document.createElement("div");
        actions.className = "actions";

        const editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.onclick = () => startEdit(note, div);

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.onclick = () => deleteNote(note.id);

        actions.appendChild(toggleBtn);
        actions.appendChild(editBtn);
        actions.appendChild(delBtn);

        div.appendChild(content);
        div.appendChild(meta);
        div.appendChild(actions);

        container.appendChild(div);
    });
}

function startEdit(note, div) {
    div.innerHTML = "";

    const textarea = document.createElement("textarea");
    textarea.value = note.content;
    textarea.rows = 4;
    textarea.style.width = "100%";
    textarea.focus();

    textarea.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
            saveEdit(note.id, textarea.value);
        }
        if (e.key === "Escape") {
            loadNotes();
        }
    });

    const saveBtn = document.createElement("button");
    saveBtn.textContent = "Save";
    saveBtn.onclick = () => saveEdit(note.id, textarea.value);

    const cancelBtn = document.createElement("button");
    cancelBtn.textContent = "Cancel";
    cancelBtn.onclick = loadNotes;

    div.appendChild(textarea);
    div.appendChild(saveBtn);
    div.appendChild(cancelBtn);
}

async function saveEdit(id, content) {
    await fetch(`${API_URL}/notes/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content })
    });

    loadNotes();
}

async function addNote() {
    const input = document.getElementById("noteInput");

    await fetch(`${API_URL}/notes`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: input.value })
    });

    input.value = "";
    loadNotes();
}

async function deleteNote(id) {
    await fetch(`${API_URL}/notes/${id}`, {
        method: "DELETE"
    });

    loadNotes();
}

loadNotes();
</script>

</body>
</html>
