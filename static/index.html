<!DOCTYPE html>
<html>
<head>
    <title>Notes</title>

    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: 40px auto;
            background: #f5f5f5;
        }

        textarea, input, select {
            width: 100%;
            padding: 6px;
            margin-bottom: 8px;
        }

        button {
            margin: 4px;
            padding: 6px 10px;
            cursor: pointer;
        }

        .note {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .content {
            white-space: pre-wrap;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
        }

        .note.collapsed .content {
            -webkit-line-clamp: 3;
        }

        .meta {
            font-size: 0.8em;
            color: gray;
            margin-top: 8px;
        }

        .actions {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .pin {
            margin-left: auto;
        }

        .pinned {
            border-left: 4px solid orange;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        #tagSuggestions {
            position: absolute;
            background: white;
            border: 1px solid #ddd;
            width: 100%;
            z-index: 9999;
            display: none;
        }

        #tagSuggestions div {
            padding: 6px;
            cursor: pointer;
        }

        #tagSuggestions div:hover {
            background: #eee;
        }

        .tag-wrapper {
            position: relative;
        }
    </style>
</head>

<body>

<h2>Notes</h2>

<textarea id="noteInput" rows="3" placeholder="Write note..."></textarea>

<div class="tag-wrapper">
    <input id="tagsInput" placeholder="tags (comma separated)">
    <div id="tagSuggestions"></div>
</div>

<button onclick="addNote()">Add</button>

<input id="searchBox" placeholder="search...">
<input id="tagFilter" placeholder="filter by tag...">

<select id="sortBox">
    <option value="newest">Newest</option>
    <option value="oldest">Oldest</option>
    <option value="az">A-Z</option>
    <option value="za">Z-A</option>
</select>

<div id="notesList"></div>

<div class="pagination">
    <button onclick="prevPage()">Prev</button>
    <button onclick="nextPage()">Next</button>
</div>

<script>
const API_URL = "http://127.0.0.1:8000";

let offset = 0;
const limit = 10;
let debounce = null;

let allTags = new Set();

const tagInput = document.getElementById("tagsInput");
const suggestionsBox = document.getElementById("tagSuggestions");

function formatDate(d) {
    const date = new Date(d);
    return isNaN(date) ? "—" : date.toLocaleString();
}

function rebuildAllTags(notes) {
    allTags.clear();

    notes.forEach(note => {
        if (note.tags) {
            note.tags.split(",")
                .map(t => t.trim())
                .filter(Boolean)
                .forEach(t => allTags.add(t));
        }
    });
}

async function loadNotes() {
    const search = searchBox.value;
    const sort = sortBox.value;
    const tag = tagFilter.value;

    const res = await fetch(
        `${API_URL}/notes?limit=${limit}&offset=${offset}&search=${encodeURIComponent(search)}&sort=${sort}&tag=${encodeURIComponent(tag)}`
    );

    const notes = await res.json();

    rebuildAllTags(notes);

    const container = document.getElementById("notesList");
    container.innerHTML = "";

    notes.forEach(note => {
        const div = document.createElement("div");
        div.className = "note collapsed";
        if (note.pinned) div.classList.add("pinned");

        const content = document.createElement("div");
        content.className = "content";
        content.textContent = note.content;

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent =
            "Tags: " + note.tags +
            " | Created: " + formatDate(note.created_at) +
            " | Updated: " + formatDate(note.updated_at);

        const actions = document.createElement("div");
        actions.className = "actions";

        const edit = document.createElement("button");
        edit.textContent = "Edit";
        edit.onclick = (e) => {
            e.stopPropagation();
            startEdit(note, div);
        };

        const del = document.createElement("button");
        del.textContent = "Delete";
        del.onclick = (e) => {
            e.stopPropagation();
            deleteNote(note.id);
        };

        const pin = document.createElement("button");
        pin.textContent = note.pinned ? "Unpin" : "Pin";
        pin.className = "pin";
        pin.onclick = (e) => {
            e.stopPropagation();
            togglePin(note);
        };

        actions.append(edit, del, pin);

        div.append(content, meta, actions);

        div.onclick = () => div.classList.toggle("collapsed");

        container.appendChild(div);
    });

    document.querySelector("button[onclick='prevPage()']").disabled = offset === 0;
    document.querySelector("button[onclick='nextPage()']").disabled = notes.length < limit;
}

function debounceLoad() {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
        offset = 0;
        loadNotes();
    }, 300);
}

searchBox.oninput = debounceLoad;
tagFilter.oninput = debounceLoad;
sortBox.onchange = () => { offset = 0; loadNotes(); };

async function addNote() {
    await fetch(`${API_URL}/notes`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            content: noteInput.value,
            tags: tagsInput.value
        })
    });

    noteInput.value = "";
    tagsInput.value = "";
    loadNotes();
}

async function deleteNote(id) {
    await fetch(`${API_URL}/notes/${id}`, { method: "DELETE" });
    loadNotes();
}

async function togglePin(note) {
    await fetch(`${API_URL}/notes/${note.id}`, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            content: note.content,
            pinned: !note.pinned,
            tags: note.tags
        })
    });

    loadNotes();
}

function nextPage() {
    offset += limit;
    loadNotes();
}

function prevPage() {
    offset = Math.max(0, offset - limit);
    loadNotes();
}

function startEdit(note, div) {
    div.innerHTML = "";

    const ta = document.createElement("textarea");
    ta.value = note.content;

    const tg = document.createElement("input");
    tg.value = note.tags;

    const save = document.createElement("button");
    save.textContent = "Save";
    save.onclick = async () => {
        await fetch(`${API_URL}/notes/${note.id}`, {
            method: "PUT",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                content: ta.value,
                pinned: note.pinned,
                tags: tg.value
            })
        });

        loadNotes();
    };

    div.append(ta, tg, save);
}

/* AUTOCOMPLETE */

tagInput.addEventListener("input", () => {
    const value = tagInput.value;
    const parts = value.split(",");
    const current = parts[parts.length - 1].trim().toLowerCase();

    if (!current) {
        suggestionsBox.style.display = "none";
        return;
    }

    const matches = [...allTags]
        .filter(t => t.toLowerCase().startsWith(current))
        .slice(0, 5);

    if (matches.length === 0) {
        suggestionsBox.style.display = "none";
        return;
    }

    suggestionsBox.innerHTML = "";
    suggestionsBox.style.display = "block";

    matches.forEach(tag => {
        const div = document.createElement("div");
        div.textContent = tag;

        div.onclick = () => {
            parts[parts.length - 1] = " " + tag;
            tagInput.value = parts.join(",").replace(/\s+,/g, ",");
            suggestionsBox.style.display = "none";
            tagInput.focus();
        };

        suggestionsBox.appendChild(div);
    });
});

tagInput.addEventListener("blur", () => {
    setTimeout(() => {
        suggestionsBox.style.display = "none";
    }, 200);
});

loadNotes();
</script>

</body>
</html>
