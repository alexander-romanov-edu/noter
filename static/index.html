<!doctype html>
<html>
  <head>
    <title>Notes</title>
    <style>
      body {
        font-family: Arial;
        max-width: 700px;
        margin: 40px auto;
        background: #f5f5f5;
      }
      textarea,
      input,
      select {
        width: 100%;
        padding: 6px;
        margin-bottom: 8px;
      }
      button {
        margin: 4px;
        padding: 6px 10px;
        cursor: pointer;
      }

      .note {
        background: white;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        cursor: pointer;
      }

      .content {
        white-space: pre-wrap;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .collapsed .content {
        -webkit-line-clamp: 3;
      }

      .meta {
        font-size: 0.8em;
        color: gray;
        margin-top: 8px;
      }
      .actions {
        display: flex;
        gap: 5px;
        margin-top: 8px;
      }
      .pin {
        margin-left: auto;
      }
      .pinned {
        border-left: 4px solid orange;
      }

      #tagSuggestions {
        position: absolute;
        background: white;
        border: 1px solid #ddd;
        width: 100%;
        display: none;
        z-index: 9999;
      }

      #tagSuggestions div {
        padding: 6px;
        cursor: pointer;
      }
      #tagSuggestions div:hover {
        background: #eee;
      }

      .tag-wrapper {
        position: relative;
      }

      #authView,
      #appView {
        background: white;
        padding: 15px;
        border-radius: 8px;
      }

      #logoutBtn {
        float: right;
      }
    </style>
  </head>

  <body>
    <div id="authView">
      <h3>Login</h3>
      <input id="username" autocomplete="username" />
      <input id="password" type="password" autocomplete="current-password" />
      <button onclick="register()">Register</button>
      <button onclick="login()">Login</button>
    </div>

    <div id="appView" style="display: none">
      <button id="logoutBtn" onclick="logout()">Logout</button>

      <h2>Notes</h2>

      <textarea id="noteInput" rows="3"></textarea>

      <div class="tag-wrapper">
        <input id="tagsInput" placeholder="tags" />
        <div id="tagSuggestions"></div>
      </div>

      <button onclick="addNote()">Add</button>

      <input id="searchBox" placeholder="search" />
      <input id="tagFilter" placeholder="filter tag" />

      <select id="sortBox">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="az">A-Z</option>
        <option value="za">Z-A</option>
      </select>

      <div id="notesList"></div>

      <button onclick="prevPage()">Prev</button>
      <button onclick="nextPage()">Next</button>
    </div>

    <script>
      const API_URL = "http://127.0.0.1:8000";

      let token = localStorage.getItem("token") || "";
      let offset = 0;
      const limit = 5;
      let allTags = new Set();
      let debounceTimer = null;

      function authHeaders() {
        return {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token,
        };
      }

      function showAuth() {
        authView.style.display = "block";
        appView.style.display = "none";

        username.value = "";
        password.value = "";
      }
      function showApp() {
        authView.style.display = "none";
        appView.style.display = "block";
        loadNotes();
      }

      function logout() {
        token = "";
        localStorage.removeItem("token");

        username.value = "";
        password.value = "";

        showAuth();
      }

      async function register() {
        await fetch(API_URL + "/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: username.value,
            password: password.value,
          }),
        });
      }

      async function login() {
        const res = await fetch(API_URL + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: username.value,
            password: password.value,
          }),
        });

        if (res.status !== 200) {
          alert("login failed");
          return;
        }

        const data = await res.json();
        token = data.access_token;
        localStorage.setItem("token", token);
        showApp();
      }

      function formatDate(d) {
        const x = new Date(d);
        return isNaN(x) ? "—" : x.toLocaleString();
      }

      function rebuildTags(notes) {
        allTags.clear();
        notes.forEach((n) => {
          if (n.tags) {
            n.tags
              .split(",")
              .map((t) => t.trim())
              .filter(Boolean)
              .forEach((t) => allTags.add(t));
          }
        });
      }

      function debounceLoad() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          offset = 0;
          loadNotes();
        }, 300);
      }

      async function loadNotes() {
        const search = encodeURIComponent(searchBox.value || "");
        const tag = encodeURIComponent(tagFilter.value || "");
        const sort = sortBox.value;

        const res = await fetch(
          `${API_URL}/notes?limit=${limit}&offset=${offset}&search=${search}&sort=${sort}&tag=${tag}`,
          { headers: authHeaders() },
        );

        if (res.status === 401) {
          logout();
          return;
        }

        const notes = await res.json();
        rebuildTags(notes);

        notesList.innerHTML = "";

        notes.forEach((note) => {
          const div = document.createElement("div");
          div.className = "note collapsed";
          if (note.pinned) div.classList.add("pinned");

          const content = document.createElement("div");
          content.className = "content";
          content.textContent = note.content;

          const meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = `Tags: ${note.tags} | Created: ${formatDate(note.created_at)} | Updated: ${formatDate(note.updated_at)}`;

          const actions = document.createElement("div");
          actions.className = "actions";

          const edit = document.createElement("button");
          edit.textContent = "Edit";
          edit.onclick = (e) => {
            e.stopPropagation();
            startEdit(note, div);
          };

          const del = document.createElement("button");
          del.textContent = "Delete";
          del.onclick = (e) => {
            e.stopPropagation();
            deleteNote(note.id);
          };

          const pin = document.createElement("button");
          pin.textContent = note.pinned ? "Unpin" : "Pin";
          pin.className = "pin";
          pin.onclick = (e) => {
            e.stopPropagation();
            togglePin(note);
          };

          actions.append(edit, del, pin);

          div.append(content, meta, actions);
          div.onclick = () => div.classList.toggle("collapsed");

          notesList.appendChild(div);
        });
      }

      async function addNote() {
        await fetch(`${API_URL}/notes`, {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            content: noteInput.value,
            tags: tagsInput.value,
          }),
        });
        noteInput.value = "";
        loadNotes();
      }

      async function deleteNote(id) {
        await fetch(`${API_URL}/notes/${id}`, {
          method: "DELETE",
          headers: authHeaders(),
        });
        loadNotes();
      }

      async function togglePin(note) {
        await fetch(`${API_URL}/notes/${note.id}`, {
          method: "PUT",
          headers: authHeaders(),
          body: JSON.stringify({
            content: note.content,
            pinned: !note.pinned,
            tags: note.tags,
          }),
        });
        loadNotes();
      }

      function startEdit(note, div) {
        div.innerHTML = "";

        const ta = document.createElement("textarea");
        ta.value = note.content;

        const tg = document.createElement("input");
        tg.value = note.tags;

        const save = document.createElement("button");
        save.textContent = "Save";
        save.onclick = async () => {
          await fetch(`${API_URL}/notes/${note.id}`, {
            method: "PUT",
            headers: authHeaders(),
            body: JSON.stringify({
              content: ta.value,
              pinned: note.pinned,
              tags: tg.value,
            }),
          });
          loadNotes();
        };

        div.append(ta, tg, save);
      }

      function nextPage() {
        offset += limit;
        loadNotes();
      }
      function prevPage() {
        offset = Math.max(0, offset - limit);
        loadNotes();
      }

      /* 🔥 FIX: hook UI to logic */
      searchBox.addEventListener("input", debounceLoad);
      tagFilter.addEventListener("input", debounceLoad);
      sortBox.addEventListener("change", () => {
        offset = 0;
        loadNotes();
      });

      /* AUTOCOMPLETE */
      tagInput.addEventListener("input", () => {
        const parts = tagInput.value.split(",");
        const cur = parts[parts.length - 1].trim().toLowerCase();

        const matches = [...allTags]
          .filter((t) => t.toLowerCase().startsWith(cur))
          .slice(0, 5);

        if (!cur || !matches.length) {
          tagSuggestions.style.display = "none";
          return;
        }

        tagSuggestions.innerHTML = "";
        tagSuggestions.style.display = "block";

        matches.forEach((t) => {
          const d = document.createElement("div");
          d.textContent = t;
          d.onclick = () => {
            parts[parts.length - 1] = " " + t;
            tagInput.value = parts.join(",").replace(/\s+,/g, ",");
            tagSuggestions.style.display = "none";
          };
          tagSuggestions.appendChild(d);
        });
      });

      tagInput.addEventListener("blur", () =>
        setTimeout(() => (tagSuggestions.style.display = "none"), 200),
      );

      if (token) {
        showApp();
      } else {
        showAuth();
      }
    </script>
  </body>
</html>
