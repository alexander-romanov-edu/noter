<!DOCTYPE html>
<html>
<head>
    <title>Notes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            margin: 5px 5px 5px 0;
            padding: 5px 10px;
            cursor: pointer;
        }

        .note {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .content {
            white-space: pre-wrap;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .note.collapsed .content {
            -webkit-line-clamp: 3;
        }

        .meta {
            font-size: 0.8em;
            color: gray;
            margin-top: 10px;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            gap: 5px;
        }

        .pin {
            margin-left: auto;
        }

        .pinned {
            border-left: 4px solid #ffb400;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>Notes</h1>

<textarea id="noteInput" rows="3" placeholder="Write a note..."></textarea>
<br>
<button onclick="addNote()">Add</button>

<div style="display:flex; gap:10px; margin-bottom:10px;">
    <input id="searchBox" placeholder="Search notes..." style="flex:1; padding:5px;">
    
    <select id="sortBox">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
    </select>
</div>
<div id="notesList"></div>

<div class="pagination">
    <button onclick="prevPage()">Previous</button>
    <button onclick="nextPage()">Next</button>
</div>

<script>
const API_URL = "http://127.0.0.1:8000";

let offset = 0;
const limit = 5;
let searchTimeout = null;

function formatDate(dateStr) {
    const d = new Date(dateStr);
    return isNaN(d.getTime()) ? "—" : d.toLocaleString();
}

async function loadNotes() {
    const search = document.getElementById("searchBox").value;
    const sort = document.getElementById("sortBox").value;
    const res = await fetch(
        `${API_URL}/notes?limit=${limit}&offset=${offset}&search=${encodeURIComponent(search)}&sort=${sort}`
    );

    const notes = await res.json();

    const container = document.getElementById("notesList");
    container.innerHTML = "";

    notes.forEach(note => {
        const div = document.createElement("div");
        div.className = "note collapsed";
        if (note.pinned) div.classList.add("pinned");

        const content = document.createElement("div");
        content.className = "content";
        content.textContent = note.content;

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent =
            "Created: " + formatDate(note.created_at) +
            " | Updated: " + formatDate(note.updated_at);

        const actions = document.createElement("div");
        actions.className = "actions";

        const editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.onclick = (e) => {
            e.stopPropagation();
            startEdit(note, div);
        };

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.onclick = (e) => {
            e.stopPropagation();
            deleteNote(note.id);
        };

        const pinBtn = document.createElement("button");
        pinBtn.className = "pin";
        pinBtn.textContent = note.pinned ? "Unpin" : "Pin";
        pinBtn.onclick = async (e) => {
            e.stopPropagation();
            await togglePin(note);
        };

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        actions.appendChild(pinBtn);

        div.appendChild(content);
        div.appendChild(meta);
        div.appendChild(actions);

        div.onclick = () => {
            div.classList.toggle("collapsed");
        };

        container.appendChild(div);
    });

    updatePaginationButtons(notes.length);
}

function updatePaginationButtons(count) {
    document.querySelector("button[onclick='prevPage()']").disabled = offset === 0;
    document.querySelector("button[onclick='nextPage()']").disabled = count < limit;
}

function nextPage() {
    offset += limit;
    loadNotes();
}

function prevPage() {
    offset = Math.max(0, offset - limit);
    loadNotes();
}

async function togglePin(note) {
    await fetch(`${API_URL}/notes/${note.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            content: note.content,
            pinned: !note.pinned
        })
    });

    loadNotes();
}

function startEdit(note, div) {
    div.innerHTML = "";

    const textarea = document.createElement("textarea");
    textarea.value = note.content;
    textarea.rows = 4;
    textarea.style.width = "100%";
    textarea.focus();

    textarea.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
            saveEdit(note.id, textarea.value);
        }
        if (e.key === "Escape") {
            loadNotes();
        }
    });

    const saveBtn = document.createElement("button");
    saveBtn.textContent = "Save";
    saveBtn.onclick = () => saveEdit(note.id, textarea.value);

    const cancelBtn = document.createElement("button");
    cancelBtn.textContent = "Cancel";
    cancelBtn.onclick = loadNotes;

    div.appendChild(textarea);
    div.appendChild(saveBtn);
    div.appendChild(cancelBtn);
}

async function saveEdit(id, content) {
    await fetch(`${API_URL}/notes/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content })
    });

    loadNotes();
}

async function addNote() {
    const input = document.getElementById("noteInput");

    await fetch(`${API_URL}/notes`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: input.value })
    });

    input.value = "";
    loadNotes();
}

async function deleteNote(id) {
    await fetch(`${API_URL}/notes/${id}`, {
        method: "DELETE"
    });

    loadNotes();
}

loadNotes();
document.getElementById("searchBox").addEventListener("input", () => {
    clearTimeout(searchTimeout);

    searchTimeout = setTimeout(() => {
        offset = 0;
        loadNotes();
    }, 300);
});

document.getElementById("sortBox").addEventListener("change", () => {
    offset = 0;
    loadNotes();
});
</script>

</body>
</html>
