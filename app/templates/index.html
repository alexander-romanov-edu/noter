<!DOCTYPE html>
<html>
<head>
    <title>Gym Tracker</title>
</head>
<body>

<h1>🏋️ Gym Tracker</h1>

<h2>Login</h2>
<input id="username" placeholder="username">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Login</button>

<h2>Create Exercise</h2>
<input id="exercise_name" placeholder="name">
<input id="muscle" placeholder="muscle">
<button onclick="createExercise()">Add</button>

<h2>Create Session</h2>
<input id="notes" placeholder="notes">
<button onclick="createSession()">Create</button>

<h2>Add Set</h2>
<input id="session_id" placeholder="session id">
<input id="exercise_id" placeholder="exercise id">
<input id="weight" placeholder="weight">
<input id="reps" placeholder="reps">
<button onclick="addSet()">Add Set</button>

<h2>Stats</h2>
<input id="stats_exercise_id" placeholder="exercise id">
<button onclick="getStats()">Get 1RM</button>

<pre id="output"></pre>

<script>
let token = "";

// LOGIN
async function login() {
    const formData = new URLSearchParams();
    formData.append("username", document.getElementById("username").value);
    formData.append("password", document.getElementById("password").value);

    const res = await fetch("/auth/login", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
    token = data.access_token;

    document.getElementById("output").innerText = "Logged in!";
}

// CREATE EXERCISE
async function createExercise() {
    const res = await fetch("/exercises/", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: document.getElementById("exercise_name").value,
            muscle_group: document.getElementById("muscle").value
        })
    });

    const data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// CREATE SESSION
async function createSession() {
    const res = await fetch("/sessions/", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            notes: document.getElementById("notes").value
        })
    });

    const data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// ADD SET
async function addSet() {
    const res = await fetch("/sets/", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            session_id: Number(document.getElementById("session_id").value),
            exercise_id: Number(document.getElementById("exercise_id").value),
            weight: Number(document.getElementById("weight").value),
            reps: Number(document.getElementById("reps").value),
            set_number: 1
        })
    });

    const data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// STATS
async function getStats() {
    const id = document.getElementById("stats_exercise_id").value;

    const res = await fetch(`/stats/one-rep-max/${id}`);
    const data = await res.json();

    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
